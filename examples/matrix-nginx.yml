##
## container for Nginx reverse proxy with Element Web client for Matrix Synapse
## Handles TLS termination, federation port 8448, rate limiting, and .well-known.
## Includes certbot for Let's Encrypt certificate management.
##
## ASSUMES: directory $HOME/matrix/nginx exists
##
## VARS (set via stack or --var):
##   DOMAIN        — public domain (e.g., matrix.example.com)
##   SERVER_NAME   — federation server name (e.g., example.com)
##   SYNAPSE_HOST  — Synapse container IP on bridge (default: 10.99.0.2)
##   LE_EMAIL      — Let's Encrypt email (optional, skip certbot if empty)
##

---

base:
  keep:
    - /usr/sbin/chown
    - /usr/bin/fetch
    - /usr/bin/tar

pkg:
  install:
    - nginx
    - py311-certbot
    - py311-certbot-nginx
    - curl

run:
  service: nginx

dirs:
  share:
    - [/usr/local/etc/nginx/conf.d, $HOME/matrix/nginx/conf.d]
    - [/var/www/element, $HOME/matrix/nginx/element]
    - [/usr/local/etc/letsencrypt, $HOME/matrix/nginx/letsencrypt]
    - [/var/www/certbot, $HOME/matrix/nginx/certbot]

options:
  net:
    mode: bridge
    bridge: bridge99
    ip: 10.99.0.3/24
    gateway: 10.99.0.1
    outbound: wan dns
    inbound-tcp:
      80: 80
      443: 443
      8448: 8448

limits:
  memoryuse: 512M

healthcheck:
  test: "curl -sf http://127.0.0.1:80/ > /dev/null || curl -sf -k https://127.0.0.1:443/ > /dev/null"
  interval: 30
  timeout: 5
  retries: 3
  start-period: 15

scripts:
  run:before-start-services:
    - "echo nginx_enable=\"YES\" >> /etc/rc.conf"
    - "mkdir -p /usr/local/etc/nginx/conf.d /var/www/certbot /var/log/nginx /var/www/element"
    # --- /etc/hosts for Synapse container ---
    - "echo '${SYNAPSE_HOST:-10.99.0.2} synapse' >> /etc/hosts"
    # --- Self-signed cert for initial start ---
    - |
      if [ ! -f /usr/local/etc/nginx/selfsigned.crt ]; then
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout /usr/local/etc/nginx/selfsigned.key \
          -out /usr/local/etc/nginx/selfsigned.crt \
          -subj "/CN=${DOMAIN}" 2>/dev/null
      fi
    # --- Main nginx.conf ---
    - |
      cat > /usr/local/etc/nginx/nginx.conf <<'NGINXMAIN'
      worker_processes auto;
      worker_rlimit_nofile 65535;
      events {
        worker_connections 4096;
        multi_accept on;
      }
      http {
        include       mime.types;
        default_type  application/octet-stream;
        sendfile      on;
        tcp_nopush    on;
        tcp_nodelay   on;
        keepalive_timeout 65;
        server_tokens off;
        log_format main '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';
        access_log /var/log/nginx/access.log main;
        error_log  /var/log/nginx/error.log warn;
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css application/json application/javascript text/xml;
        upstream synapse_backend {
          server synapse:8008;
          keepalive 32;
        }
        include conf.d/*.conf;
      }
      NGINXMAIN
    # --- Matrix server block ---
    - |
      if [ ! -f /usr/local/etc/nginx/conf.d/matrix.conf ]; then
        cat > /usr/local/etc/nginx/conf.d/matrix.conf <<NGINXMATRIX
      limit_req_zone \$binary_remote_addr zone=matrix_login:10m rate=5r/s;
      limit_req_zone \$binary_remote_addr zone=matrix_register:10m rate=1r/s;
      limit_req_zone \$binary_remote_addr zone=matrix_general:10m rate=30r/s;

      # HTTP -> HTTPS redirect
      server {
        listen 80;
        listen [::]:80;
        server_name ${DOMAIN};
        location /.well-known/acme-challenge/ {
          root /var/www/certbot;
          allow all;
        }
        location / {
          return 301 https://\$host\$request_uri;
        }
      }

      # Main HTTPS server
      server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${DOMAIN};

        ssl_certificate     /usr/local/etc/nginx/selfsigned.crt;
        ssl_certificate_key /usr/local/etc/nginx/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:MX_SSL:10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;

        client_max_body_size 100M;

        location /.well-known/matrix/server {
          default_type application/json;
          return 200 '{"m.server": "${DOMAIN}:443"}';
          add_header Access-Control-Allow-Origin '*';
        }
        location /.well-known/matrix/client {
          default_type application/json;
          return 200 '{"m.homeserver":{"base_url":"https://${DOMAIN}"},"m.identity_server":{"base_url":"https://matrix.org"}}';
          add_header Access-Control-Allow-Origin '*';
          add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
          add_header Access-Control-Allow-Headers 'X-Requested-With, Content-Type, Authorization';
        }
        location ~* ^(\/_matrix|\/_synapse\/client) {
          limit_req zone=matrix_general burst=50 nodelay;
          proxy_pass http://synapse_backend;
          proxy_set_header X-Forwarded-For \$remote_addr;
          proxy_set_header X-Forwarded-Proto \$scheme;
          proxy_set_header Host \$host;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_read_timeout 600s;
          proxy_send_timeout 600s;
        }
        location /_matrix/client/r0/login {
          limit_req zone=matrix_login burst=10 nodelay;
          proxy_pass http://synapse_backend;
          proxy_set_header X-Forwarded-For \$remote_addr;
          proxy_set_header X-Forwarded-Proto \$scheme;
          proxy_set_header Host \$host;
        }
        location /_matrix/client/r0/register {
          limit_req zone=matrix_register burst=3 nodelay;
          proxy_pass http://synapse_backend;
          proxy_set_header X-Forwarded-For \$remote_addr;
          proxy_set_header X-Forwarded-Proto \$scheme;
          proxy_set_header Host \$host;
        }
        location /_synapse/admin {
          proxy_pass http://synapse_backend;
          proxy_set_header X-Forwarded-For \$remote_addr;
          proxy_set_header X-Forwarded-Proto \$scheme;
          proxy_set_header Host \$host;
        }
        location / {
          root /var/www/element;
          index index.html;
          try_files \$uri \$uri/ /index.html;
        }
      }

      # Federation port 8448
      server {
        listen 8448 ssl http2;
        listen [::]:8448 ssl http2;
        server_name ${DOMAIN};

        ssl_certificate     /usr/local/etc/nginx/selfsigned.crt;
        ssl_certificate_key /usr/local/etc/nginx/selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        client_max_body_size 100M;

        location / {
          proxy_pass http://synapse_backend;
          proxy_set_header X-Forwarded-For \$remote_addr;
          proxy_set_header X-Forwarded-Proto \$scheme;
          proxy_set_header Host \$host;
          proxy_http_version 1.1;
          proxy_read_timeout 600s;
        }
      }
      NGINXMATRIX
      fi
    # --- Element Web ---
    - |
      if [ ! -f /var/www/element/index.html ]; then
        ELEMENT_VERSION=$(fetch -qo - "https://api.github.com/repos/element-hq/element-web/releases/latest" 2>/dev/null | \
          grep '"tag_name"' | head -1 | sed 's/.*"v\(.*\)".*/\1/')
        : "${ELEMENT_VERSION:=1.11.85}"
        cd /tmp
        fetch "https://github.com/element-hq/element-web/releases/download/v${ELEMENT_VERSION}/element-v${ELEMENT_VERSION}.tar.gz" 2>/dev/null
        tar xzf "element-v${ELEMENT_VERSION}.tar.gz" -C /var/www/element --strip-components=1
        rm -f "element-v${ELEMENT_VERSION}.tar.gz"
      fi
    - |
      cat > /var/www/element/config.json <<ELEMCONF
      {
        "default_server_config": {
          "m.homeserver": {
            "base_url": "https://${DOMAIN}",
            "server_name": "${SERVER_NAME}"
          },
          "m.identity_server": {
            "base_url": "https://vector.im"
          }
        },
        "disable_custom_urls": false,
        "disable_guests": true,
        "disable_login_language_selector": false,
        "disable_3pid_login": false,
        "brand": "Element",
        "default_federate": true,
        "default_theme": "light",
        "room_directory": {
          "servers": ["${SERVER_NAME}", "matrix.org"]
        },
        "setting_defaults": {
          "breadcrumbs": true
        }
      }
      ELEMCONF
    - "chown -R www:www /var/www/element"
