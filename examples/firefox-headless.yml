##
## container for the Firefox browser in headless mode with VNC access
## Use: crate create -s firefox-headless.yml
## After running: crate gui list ; crate gui url firefox
##

---

pkg:
    install:
        - firefox

run:
    command: /usr/local/bin/firefox

options:
    - net
    - x11
    - gl
    - video

gui:
    mode: headless
    resolution: 1920x1080
    vnc: true
    novnc: true
