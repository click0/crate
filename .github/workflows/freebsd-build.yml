name: FreeBSD Build (full)

# Повна збірка через `gmake`, всі kyua-тести і ci-verify.sh.
#
# ⚠️ MANUAL-ONLY (workflow_dispatch). Авто-тригери (push / pull_request
# / cron) свідомо ВИМКНЕНО 2026-06 — GitHub-hosted FreeBSD-раннери
# (QEMU-VM через cross-platform-actions) для цього пайплайна
# непридатні з ДВОХ незалежних причин, підтверджених на ~7 прогонах:
#
#   1. Per-boot SSH/DNS-флейк: ~4 з 5 бутів VM зависають — slirp-DNS
#      усередині гостя мертвий, host-side ssh висне до step-таймауту
#      (console: ntpd 45+ хв "Name does not resolve").
#   2. Навіть здоровий бут НЕ ВСТИГАЄ: 29 секцій ci-verify.sh
#      (runtime-тести на реальних jail'ах) на 2-vCPU QEMU-VM з'їдають
#      >90 хв — спостережений прогін пройшов SSH і вмер на T10/29.
#
# Тобто full не може надійно нічого gate'ити. FreeBSD-покриття на
# кожен пуш дає freebsd-build-lite.yml (boot + pkg + компіляція +
# лінк crate(1) + юніт-сюїта, ~3-5 хв, стабільно зелений). Цей
# workflow лишається для ручної глибокої валідації (функціональні
# тести + ci-verify) — запускай вручну і ретрай до здорової VM.
#
# Повернути в авто-CI можна лише після переходу на self-hosted
# FreeBSD-раннер (нативна збірка ~3-5 хв) АБО якщо upstream
# cross-platform-actions полагодить slirp-флейк.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Manual-only: щедрий ліміт, щоб ручний прогін на здоровій VM
    # встиг дофінішувати ci-verify (>90 хв на 2-vCPU QEMU). Якщо
    # попався флейковий бут — оператор просто перезапускає; марно
    # горіти 6 год не даємо.
    timeout-minutes: 200
    strategy:
      fail-fast: false
      matrix:
        freebsd-version: ['14.2', '15.0']
    name: FreeBSD ${{ matrix.freebsd-version }} full
    steps:
      - uses: actions/checkout@v4

      # Чому цей workflow manual-only — повна історія розсліду
      # 2026-06 (щоб наступний maintainer не починав з нуля):
      #
      # 8 травня (#160) у workflow додали `memory: 6G`/`cpu_count: 3`.
      # З 11.05 по 08.06 — 6 поспіль weekly cron'ів падали на SSH-фазі:
      # VM бутиться до `login:`, ntpd 45 хв спамить "Name does not
      # resolve" (slirp-DNS мертвий усередині VM), host-ssh висне до
      # step-timeout. 10.06 фікс мертвих тригерів (master->main, #216)
      # розкрив справжню частоту: ~4 з 5 бутів обох VM зависають —
      # дефолтні ресурси і бамп екшена v1.2.0 не лікують, бо це
      # per-boot infra-флейк у пулі QEMU-VM, не наш конфіг. А єдиний
      # бут, що пройшов SSH, уперся в ДРУГУ ваду: 29 секцій ci-verify
      # на реальних jail'ах не влазять у 90 хв (вмер на T10/29).
      #
      # Дві незалежні вади => full не може надійно gate'ити CI =>
      # workflow_dispatch only. Авто-покриття дає lite. Повернення в
      # авто-CI = self-hosted FreeBSD-раннер (нативна збірка ~3-5 хв)
      # або upstream-фікс slirp-флейку.
      - name: Build + test on FreeBSD
        uses: cross-platform-actions/action@v1.2.0
        # Manual-режим: щедрий step-ліміт під здоровий повний прогін.
        timeout-minutes: 190
        with:
          operating_system: freebsd
          version: ${{ matrix.freebsd-version }}
          shell: sh
          # 2026-06: прибрано явні memory: 6G / cpu_count: 3.
          # Емпірика: lite-джоба (без overrides, дефолти екшена —
          # 6G / 2 vCPU у v1.x) проходить SSH-фазу стабільно; full із
          # цими overrides повисала на SSH у КОЖНОМУ спостереженому
          # прогоні (6 тижневих cron'ів + 2 прогони 2026-06-10, на
          # v0.32.0 і v1.2.0 однаково): VM бутиться, DNS у slirp
          # мертвий, host-ssh висить до 45-хв таймауту. Єдина
          # конфіг-різниця між робочою lite і висячою full — саме ці
          # два рядки, тож вирівнюємо з known-good. Коментар про
          # "default ~6GB / 4 vCPU" був застарілий: у v1.x дефолт
          # cpu_count = 2, тобто 3 його ПІДВИЩУВАВ, а не стримував.
          run: |
            set -ex

            echo "::group::Install dependencies"
            # `atf` ships /usr/local/bin/atf-sh, the interpreter for our
            # functional test scripts (#!/usr/bin/env atf-sh). It is NOT
            # pulled in as a kyua dependency, so an explicit install
            # avoids the "Invalid header for test case list; got ''"
            # broken result.
            sudo pkg install -y pkgconf yaml-cpp rang kyua atf gmake cpp-httplib
            echo "::endgroup::"

            echo "::group::System info"
            uname -a
            c++ --version
            NCPU=$(sysctl -n hw.ncpu)
            # Обмежуємо паралелізм, щоб не з'їсти всю пам'ять VM
            # під час лінкування libcrate.a + crate.
            JOBS=$(( NCPU < 3 ? NCPU : 2 ))
            echo "ncpu=$NCPU jobs=$JOBS"
            df -h
            echo "::endgroup::"

            echo "::group::Build crate (gmake)"
            gmake -j"$JOBS" crate
            ls -la crate
            file crate || true
            echo "::endgroup::"

            echo "::group::Build unit tests"
            # Drive via gmake so the test list lives in one place
            # (Makefile UNIT_TESTS). Adding a new test requires only
            # one edit (the Makefile) instead of three.
            gmake -j"$JOBS" build-unit-tests
            echo "::endgroup::"

            echo "::group::Ensure functional tests are executable"
            chmod +x tests/functional/crate_info_test
            echo "::endgroup::"

            echo "::group::Run kyua test suite"
            # Без `|| true`. Провал тесту = провал CI.
            # `set +e` локально — щоб встигнути зібрати report навіть при провалі.
            set +e
            ( cd tests && sudo kyua test )
            KYUA_RC=$?
            ( cd tests && sudo kyua report --verbose )
            ( cd tests && sudo kyua report-html --output=../kyua-html ) || true
            set -e
            test "$KYUA_RC" -eq 0
            echo "::endgroup::"

            echo "::group::CI verification (ci-verify.sh)"
            sudo sh tests/ci-verify.sh .
            echo "::endgroup::"

            echo "::group::Disk usage after build"
            df -h
            du -sh lib/*.o crate libcrate.a 2>/dev/null | tail -n 20 || true
            echo "::endgroup::"

      - name: Upload crate binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crate-${{ matrix.freebsd-version }}
          path: |
            crate
            libcrate.a
          if-no-files-found: warn
          retention-days: 14

      - name: Upload kyua HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kyua-report-${{ matrix.freebsd-version }}
          path: kyua-html
          if-no-files-found: ignore
          retention-days: 14
