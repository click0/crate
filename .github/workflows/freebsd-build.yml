name: FreeBSD Build

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        freebsd-version: ['14.2', '15.0']
    name: FreeBSD ${{ matrix.freebsd-version }} build+test
    steps:
    - uses: actions/checkout@v4

    - name: Build and test on FreeBSD
      uses: cross-platform-actions/action@v0.32.0
      timeout-minutes: 25
      with:
        operating_system: freebsd
        version: ${{ matrix.freebsd-version }}
        run: |
          set -ex

          echo "::group::Install dependencies"
          sudo pkg install -y pkgconf yaml-cpp rang kyua
          echo "::endgroup::"

          echo "::group::System info"
          uname -a
          c++ --version
          sysctl hw.ncpu
          echo "::endgroup::"

          echo "::group::Compile changed components"
          CXXFLAGS="-Wall -std=c++17 -Ilib $(pkg-config --cflags yaml-cpp)"
          for f in lib/run.cpp lib/util.cpp lib/create.cpp lib/locs.cpp lib/mount.cpp; do
            echo "  Compiling $f ..."
            c++ $CXXFLAGS -c "$f" -o "${f%.cpp}.o"
          done
          echo "::endgroup::"

          echo "::group::Kyua unit tests"
          ATF_LIBS="-L/usr/local/lib -latf-c++ -latf-c"
          for t in util_test spec_test spec_netopt_test lifecycle_test network_test network_ipv6_test err_test; do
            echo "  Compiling tests/unit/${t} ..."
            c++ -std=c++17 -Ilib -o "tests/unit/${t}" "tests/unit/${t}.cpp" $ATF_LIBS
          done
          chmod +x tests/functional/crate_info_test
          cd tests && sudo kyua test || true
          sudo kyua report --verbose || true
          cd ..
          echo "::endgroup::"

          echo "::group::CI verification tests"
          sudo sh tests/ci-verify.sh .
          echo "::endgroup::"
