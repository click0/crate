name: FreeBSD Build (full)

# Повна збірка через `gmake`, всі kyua-тести і ci-verify.sh.
# Запускається на:
#   * push у main         (gate'ить mainline);
#   * pull_request → main (gate'ить злиття);
#   * щотижневий cron     (ловить bit-rot із новими версіями FreeBSD);
#   * workflow_dispatch   (ручний запуск).
#
# Швидкий смок-чек на feature-гілках живе в freebsd-build-lite.yml.
#
# 2026-06: push/PR-тригери вказували на `master`, але дефолтна гілка
# репо — `main`, тож вони були мертві: full бігав ЛИШЕ за щотижневим
# cron'ом. Саме тому -lnv-промах у лінку crate(1) жив у main тижнями
# (lite не лінкував бінарники до 2026-06; weekly-прогони падали ще на
# SSH-фазі до VM). Виправлено на `main`.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'TODO'
      - 'CHANGELOG.md'
      - 'completions/**'
      - 'examples/**'
      - 'templates/**'
      - 'crate.5'
      - '.github/workflows/freebsd-build-lite.yml'
  pull_request:
    branches: [main]
  schedule:
    # 1-го числа щомісяця о 04:00 UTC — ловить bit-rot від оновлень
    # pkg / нових версій FreeBSD. Було щотижня; зменшено до щомісяця,
    # щоб не ганяти важкі FreeBSD-VM даремно: тепер, коли push у main
    # тригерить full (тригери полагоджено 2026-06), кожен merge і так
    # отримує повну збірку — cron лишається тільки страховкою для
    # тихих періодів без комітів.
    - cron: '0 4 1 * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 2026-06: 50 -> 100. Після лікування SSH-hang з'ясувалось, що
    # повний пайплайн (deps + build + повна kyua-сюїта з функціональними
    # тестами + 29 секцій ci-verify.sh з runtime-інтеграцією на реальних
    # jail'ах) фізично не влазив у старий ліміт: перший прогін, що
    # взагалі дійшов до ci-verify, був зрізаний 45-хв step-таймаутом на
    # секції T10/29. Сам білд швидкий (~3 хв, див. lite) — час їдять
    # runtime-тести на 2 vCPU VM.
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        freebsd-version: ['14.2', '15.0']
    name: FreeBSD ${{ matrix.freebsd-version }} full
    steps:
      - uses: actions/checkout@v4

      - name: Build + test on FreeBSD
        # 2026-06: bump v0.32.0 -> v1.2.0. Драйвер — GitHub примусово
        # перемикає Node 20 -> Node 24 на раннерах з 16 червня 2026;
        # v0.x екшени на Node 20, v1.0.0+ зібрані під Node 24. Breaking
        # changes v1.0.0 нас не зачіпають (ми ubuntu-latest + QEMU;
        # прибрані macOS-раннери та Xhyve). `run:`-input у v1.x
        # deprecated на користь cpa.sh-степів, але працює; міграція на
        # cpa.sh — окремий крок, не змішуємо з бампом.
        uses: cross-platform-actions/action@v1.2.0
        # 45 -> 90: див. коментар біля job-level timeout.
        timeout-minutes: 90
        with:
          operating_system: freebsd
          version: ${{ matrix.freebsd-version }}
          shell: sh
          # 2026-06: прибрано явні memory: 6G / cpu_count: 3.
          # Емпірика: lite-джоба (без overrides, дефолти екшена —
          # 6G / 2 vCPU у v1.x) проходить SSH-фазу стабільно; full із
          # цими overrides повисала на SSH у КОЖНОМУ спостереженому
          # прогоні (6 тижневих cron'ів + 2 прогони 2026-06-10, на
          # v0.32.0 і v1.2.0 однаково): VM бутиться, DNS у slirp
          # мертвий, host-ssh висить до 45-хв таймауту. Єдина
          # конфіг-різниця між робочою lite і висячою full — саме ці
          # два рядки, тож вирівнюємо з known-good. Коментар про
          # "default ~6GB / 4 vCPU" був застарілий: у v1.x дефолт
          # cpu_count = 2, тобто 3 його ПІДВИЩУВАВ, а не стримував.
          run: |
            set -ex

            echo "::group::Install dependencies"
            # `atf` ships /usr/local/bin/atf-sh, the interpreter for our
            # functional test scripts (#!/usr/bin/env atf-sh). It is NOT
            # pulled in as a kyua dependency, so an explicit install
            # avoids the "Invalid header for test case list; got ''"
            # broken result.
            sudo pkg install -y pkgconf yaml-cpp rang kyua atf gmake cpp-httplib
            echo "::endgroup::"

            echo "::group::System info"
            uname -a
            c++ --version
            NCPU=$(sysctl -n hw.ncpu)
            # Обмежуємо паралелізм, щоб не з'їсти всю пам'ять VM
            # під час лінкування libcrate.a + crate.
            JOBS=$(( NCPU < 3 ? NCPU : 2 ))
            echo "ncpu=$NCPU jobs=$JOBS"
            df -h
            echo "::endgroup::"

            echo "::group::Build crate (gmake)"
            gmake -j"$JOBS" crate
            ls -la crate
            file crate || true
            echo "::endgroup::"

            echo "::group::Build unit tests"
            # Drive via gmake so the test list lives in one place
            # (Makefile UNIT_TESTS). Adding a new test requires only
            # one edit (the Makefile) instead of three.
            gmake -j"$JOBS" build-unit-tests
            echo "::endgroup::"

            echo "::group::Ensure functional tests are executable"
            chmod +x tests/functional/crate_info_test
            echo "::endgroup::"

            echo "::group::Run kyua test suite"
            # Без `|| true`. Провал тесту = провал CI.
            # `set +e` локально — щоб встигнути зібрати report навіть при провалі.
            set +e
            ( cd tests && sudo kyua test )
            KYUA_RC=$?
            ( cd tests && sudo kyua report --verbose )
            ( cd tests && sudo kyua report-html --output=../kyua-html ) || true
            set -e
            test "$KYUA_RC" -eq 0
            echo "::endgroup::"

            echo "::group::CI verification (ci-verify.sh)"
            sudo sh tests/ci-verify.sh .
            echo "::endgroup::"

            echo "::group::Disk usage after build"
            df -h
            du -sh lib/*.o crate libcrate.a 2>/dev/null | tail -n 20 || true
            echo "::endgroup::"

      - name: Upload crate binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: crate-${{ matrix.freebsd-version }}
          path: |
            crate
            libcrate.a
          if-no-files-found: warn
          retention-days: 14

      - name: Upload kyua HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kyua-report-${{ matrix.freebsd-version }}
          path: kyua-html
          if-no-files-found: ignore
          retention-days: 14
