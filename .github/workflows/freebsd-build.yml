name: FreeBSD Build

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        freebsd-version: ['14.2', '15.0']
    name: FreeBSD ${{ matrix.freebsd-version }} build+test
    steps:
    - uses: actions/checkout@v4

    - name: Build and test on FreeBSD
      uses: cross-platform-actions/action@v0.32.0
      timeout-minutes: 25
      with:
        operating_system: freebsd
        version: ${{ matrix.freebsd-version }}
        run: |
          set -ex

          echo "::group::Install dependencies"
          sudo pkg install -y pkgconf yaml-cpp rang
          echo "::endgroup::"

          echo "::group::System info"
          uname -a
          c++ --version
          sysctl hw.ncpu
          echo "::endgroup::"

          echo "::group::Build"
          NPROC=$(sysctl -n hw.ncpu 2>/dev/null || echo 2)
          make -j"$NPROC" all
          echo "::endgroup::"

          echo "::group::CI verification tests"
          sudo sh tests/ci-verify.sh .
          echo "::endgroup::"
