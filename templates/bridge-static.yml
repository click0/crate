# Bridge + static IP template: container on physical network with fixed address
# Prerequisites: create bridge first:
#   ifconfig bridge0 create
#   ifconfig bridge0 addm em0
#   ifconfig bridge0 up
# Usage: crate create --template bridge-static -s myapp.yml -o myapp.crate
# Note: edit ip/gateway to match your network

options:
  net:
    mode: bridge
    bridge: bridge0
    ip: 192.168.1.100/24
    gateway: 192.168.1.1
    static-mac: true
